name: Update News Feed

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Fetch RSS feeds and images
        run: npm run fetch-feeds
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Guardrails: flip GEMINI_ENABLED to 'true' only when ready to spend quota
          GEMINI_ENABLED: 'false'
          GEMINI_MAX_CALLS: '12'

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/feed.json public/images/feed/
          git diff --staged --quiet || git commit -m "chore: update hourly tech news feed"
          git push

      - name: Notify SiteCommand feed update (optional)
        env:
          SITECOMMAND_WEBHOOK_URL: ${{ secrets.SITECOMMAND_WEBHOOK_URL }}
        run: |
          if [ -n "$SITECOMMAND_WEBHOOK_URL" ]; then
            curl -sf -X POST "$SITECOMMAND_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"event\":\"feed_update\",\"site\":\"give-me-tech.com\",\"repo\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\"}" \
              || true
          fi

      # Push to main triggers deploy-pages.yml automatically
