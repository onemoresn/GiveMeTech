name: Update News Feed

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Fetch RSS feeds and images
        run: npm run fetch-feeds
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/feed.json public/images/feed/
          git diff --staged --quiet || git commit -m "chore: update hourly tech news feed"
          git push

      # Push to main triggers deploy-pages.yml automatically
